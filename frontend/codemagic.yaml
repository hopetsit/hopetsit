workflows:

  # ─── ANDROID BUILD ────────────────────────────────────────────────────────
  android-release:
    name: Android Release (APK + AAB)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: 3.24.0
      android_signing:
        - hopetsit_keystore          # Add in Codemagic → Code signing
      groups:
        - hopetsit_env               # Add env vars group in Codemagic
      vars:
        PACKAGE_NAME: "com.hopetsit.app"
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK (direct install)
        script: |
          flutter build apk --release \
            --dart-define=API_URL=$API_URL
      - name: Build AAB (Google Play)
        script: |
          flutter build appbundle --release \
            --dart-define=API_URL=$API_URL
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - daniel@hopetsit.com
        notify:
          success: true
          failure: true

  # ─── IOS BUILD ───────────────────────────────────────────────────────────
  ios-release:
    name: iOS Release (TestFlight + App Store)
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: HopeTSIT_AppStoreConnect  # Set up in Codemagic
    environment:
      flutter: 3.24.0
      ios_signing:
        distribution_type: app_store      # Change to 'ad_hoc' for TestFlight beta
        bundle_identifier: com.hopetsit.app
      groups:
        - hopetsit_env
      vars:
        BUNDLE_ID: "com.hopetsit.app"
        APP_STORE_APPLE_ID: "REPLACE_WITH_YOUR_APP_ID"  # From App Store Connect
    scripts:
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios && pod install
        working_directory: $CM_BUILD_DIR
      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist \
            --dart-define=API_URL=$API_URL
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        # Automatically upload to TestFlight
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false   # Set true when ready for App Store
        beta_groups:
          - "Internal Testers"
      email:
        recipients:
          - daniel@hopetsit.com
        notify:
          success: true
          failure: true
