name: hopetsit
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.2
  get_it: ^8.2.0
  cached_network_image: ^3.4.1
  firebase_core: ^4.1.1
  firebase_auth: ^6.1.0
  firebase_messaging: ^16.0.2
  google_sign_in: ^7.2.0
  the_apple_sign_in: ^1.1.1
  google_fonts: ^6.3.2
  flutter_local_notifications: ^19.4.2
  image_picker: ^1.2.0
  file_picker: ^10.3.3
  intl: ^0.20.2
  table_calendar: ^3.1.2
  sentry_flutter: ^8.11.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  flutter_svg: ^2.2.1
  http: ^1.5.0
  share_plus: ^12.0.1
  mime: ^1.0.4
  animated_custom_dropdown: ^3.1.1
  socket_io_client: ^3.1.3
  flutter_screenutil: ^5.9.3
  pinput: ^5.0.2
  get_storage: ^2.1.1
  webview_flutter: ^4.13.1
  photo_view: ^0.14.0
  flutter_stripe: ^11.1.0
  shimmer: ^3.0.0
  flutter_dotenv: ^6.0.0
  country_code_picker: ^3.4.1
  geolocator: ^14.0.2
  google_maps_flutter: ^2.14.0
  geocoding: ^4.0.0
  google_places_flutter: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  # Session v16-1b — official HopeTSIT logo integration. flutter_launcher_icons
  # reads the PNG source files under assets/brand/png/ and generates every
  # Android mipmap-* density + iOS AppIcon.appiconset size automatically.
  # Run: dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.1

# flutter_launcher_icons config — single source of truth for app icons.
# The SVGs in assets/brand/{android,apple}/ stay for reference (and future
# manual edits); what the plugin actually uses are the 1024x1024 PNG rasters
# generated under assets/brand/png/.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/brand/png/ic_launcher.png"
  image_path_ios: "assets/brand/png/apple-icon-original.png"
  # iOS 18 delivers 3 appearance variants (default / dark / tinted).
  # The plugin ≥ 0.14 picks them up automatically and writes the right
  # metadata in AppIcon.appiconset/Contents.json.
  image_path_ios_dark_transparent_background: "assets/brand/png/apple-icon-dark.png"
  image_path_ios_tinted_grayscale: "assets/brand/png/apple-icon-white.png"
  # Android 8+ adaptive icons: separate foreground + solid orange background.
  adaptive_icon_foreground: "assets/brand/png/ic_launcher_foreground.png"
  adaptive_icon_background: "#EF4324"
  # Monochrome variant for Android 13+ themed icons. Uses the foreground
  # layer since the notification SVG is already optimised for a single colour.
  adaptive_icon_monochrome: "assets/brand/png/ic_launcher_foreground.png"
  # Disable the alpha stripper on iOS (Apple rejected transparent icons
  # historically; our source PNGs don't have transparency anyway).
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/brand/
    - assets/brand/android/
    - assets/brand/apple/
    - assets/brand/web/
    - assets/brand/png/
    - .env
